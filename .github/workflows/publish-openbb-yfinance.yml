name: 📦 publish openbb-yfinance

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-check:
    name: Verify version bump
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/openbb-yfinance-v')) || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    defaults:
      run:
        shell: bash
        working-directory: providers/yfinance
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Parse [project].version from pyproject.toml
        id: parse
        run: |
          VERSION=$(grep -m1 -E '^version[[:space:]]*=' pyproject.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse [project].version from pyproject.toml."
            exit 1
          fi
          echo "Local version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if version already exists on PyPI
        env:
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/openbb-yfinance/${VERSION}/json")
          case "$STATUS" in
            200)
              echo "::error::openbb-yfinance ${VERSION} is already published on PyPI."
              echo "Bump providers/yfinance/pyproject.toml [project].version and re-merge a fresh release branch."
              exit 1
              ;;
            404)
              echo "openbb-yfinance ${VERSION} is not yet on PyPI — proceeding."
              ;;
            *)
              echo "::error::Unexpected status $STATUS from PyPI JSON API. Aborting to avoid a silent skip."
              exit 1
              ;;
          esac

      - name: Verify release branch name matches pyproject version
        if: github.event_name == 'pull_request'
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          EXPECTED="release/openbb-yfinance-v${VERSION}"
          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "::error::Release branch '${BRANCH}' does not match pyproject version '${VERSION}'."
            echo "Expected branch name: '${EXPECTED}'."
            echo "Either rename the release branch or update [project].version in pyproject.toml so they agree."
            exit 1
          fi
          echo "Branch '${BRANCH}' matches pyproject version '${VERSION}'."

  build:
    name: Build wheel (vendors v5 openbb-*)
    needs: version-check
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: providers/yfinance
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      # openbb-core/-charting/-platform-api target the unpublished v5 line, so
      # their sources are vendored into the wheel at build time (hatch_build.py).
      - name: Check out OpenBB v5 sources to vendor
        uses: actions/checkout@v6
        with:
          repository: OpenBB-finance/OpenBB
          ref: v5
          path: _openbb_v5
          sparse-checkout: |
            openbb_platform/core
            openbb_platform/obbject_extensions/charting
            openbb_platform/extensions/platform_api

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Build the self-contained wheel
        env:
          OPENBB_VENDOR_SRC: ${{ github.workspace }}/_openbb_v5
        run: uv build --wheel --no-sources

      - uses: actions/upload-artifact@v4
        with:
          name: openbb-yfinance-dist
          path: providers/yfinance/dist/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python_version: "3.10" }
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          - { os: ubuntu-latest, python_version: "3.14" }
          - { os: macos-latest, python_version: "3.10" }
          - { os: macos-latest, python_version: "3.14" }
          - { os: windows-latest, python_version: "3.10" }
          - { os: windows-latest, python_version: "3.14" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: providers/yfinance
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          allow-prereleases: true

      - uses: actions/download-artifact@v4
        with:
          name: openbb-yfinance-dist
          path: providers/yfinance/dist

      - run: python -m pip install --upgrade pip uv

      - name: Install dev tooling + the built wheel
        run: |
          uv pip install --system --group dev
          uv pip install --system dist/openbb_yfinance-*.whl

      - name: Test the installed wheel
        run: |
          rm -rf openbb_yfinance
          pytest tests -m "not integration" --cov=openbb_yfinance --cov-report=term-missing

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: openbb-yfinance-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
