; Day gainers — large/mid-cap US names up sharply on the session.
; Formerly the equity.discovery.gainers endpoint.

[screener]
type = equity
sort_field = percentchange
sort_type = DESC
limit = 250

[filters]
exchange = NMS,NYQ
intradaymarketcap_gt = 500000000
percentchange_gt = 3
intradayprice_gt = 5
