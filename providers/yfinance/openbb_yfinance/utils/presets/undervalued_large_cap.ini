; Undervalued large caps — >10B cap with strong EPS growth at a low PE and PEG.
; Formerly the equity.discovery.undervalued_large_caps endpoint.
; PE 0-20 is expressed as paired _gte / _lte (the INI has no 'between').

[screener]
type = equity
sort_field = eodvolume
sort_type = DESC
limit = 250

[filters]
exchange = NMS,NYQ
intradaymarketcap_gt = 10000000000
peratio.lasttwelvemonths_gte = 0
peratio.lasttwelvemonths_lte = 20
pegratio_5y_lt = 1
epsgrowth.lasttwelvemonths_gte = 25
